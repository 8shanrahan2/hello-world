<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello World Web App</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section id="login-view" class="card" aria-labelledby="login-heading">
        <p class="eyebrow">Hello World Web App</p>
        <h1 id="login-heading">Sign in</h1>
        <p class="subtitle">Use the demo account to access the app.</p>

        <form id="login-form" class="login-form">
          <label>
            Email
            <input id="email" name="email" type="email" autocomplete="email" required />
          </label>

          <label>
            Password
            <input id="password" name="password" type="password" autocomplete="current-password" required />
          </label>

          <button type="submit">Log in</button>
          <p id="login-message" class="message" aria-live="polite"></p>
        </form>

        <p class="hint">Demo login: <strong>demo@example.com</strong> / <strong>password123</strong></p>
      </section>

      <section id="app-view" class="card hidden" aria-labelledby="app-heading">
        <p class="eyebrow">Hello World Web App</p>
        <h1 id="app-heading">Hello, world!</h1>
        <p class="subtitle">You are signed in to this tiny static web app.</p>
        <button id="hello-button" type="button">Click me</button>
        <button id="logout-button" class="secondary" type="button">Log out</button>
        <p id="message" class="message" aria-live="polite"></p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
