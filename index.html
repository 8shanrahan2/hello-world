<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello World Web App</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section id="auth-view" class="card" aria-labelledby="auth-heading">
        <p class="eyebrow">Hello World Web App</p>
        <h1 id="auth-heading">Create account or sign in</h1>
        <p class="subtitle">Use Supabase Auth to create a user account, log in, and persist your session.</p>

        <div class="tabs" role="tablist" aria-label="Auth mode">
          <button id="login-tab" class="tab active" type="button" aria-selected="true">Log in</button>
          <button id="signup-tab" class="tab" type="button" aria-selected="false">Create account</button>
        </div>

        <form id="auth-form" class="auth-form">
          <label>
            Email
            <input id="email" name="email" type="email" autocomplete="email" required />
          </label>

          <label>
            Password
            <input id="password" name="password" type="password" autocomplete="current-password" minlength="6" required />
          </label>

          <button id="auth-submit" type="submit">Log in</button>
          <p id="auth-message" class="message" aria-live="polite"></p>
        </form>

        <p class="hint">
          Before this works, add your Supabase publishable key in <code>config.js</code>.
        </p>
      </section>

      <section id="app-view" class="card hidden" aria-labelledby="app-heading">
        <p class="eyebrow">Hello World Web App</p>
        <h1 id="app-heading">Hello, world!</h1>
        <p id="user-summary" class="subtitle">You are signed in.</p>

        <div class="button-row">
          <button id="hello-button" type="button">Click me</button>
          <button id="logout-button" class="secondary" type="button">Log out</button>
        </div>
        <p id="message" class="message" aria-live="polite"></p>

        <section class="chat-panel" aria-labelledby="chat-heading">
          <div class="chat-header">
            <div>
              <p class="eyebrow">OpenRouter</p>
              <h2 id="chat-heading">Ask a free model</h2>
            </div>
            <label class="model-picker">
              Model
              <select id="model-select" name="model">
                <option value="cohere/north-mini-code:free">Cohere North Mini Code</option>
                <option value="nvidia/nemotron-3-ultra-550b-a55b:free">NVIDIA Nemotron 3 Ultra</option>
              </select>
            </label>
          </div>

          <div id="chat-log" class="chat-log" aria-live="polite"></div>

          <form id="chat-form" class="chat-form">
            <label>
              Message
              <textarea id="chat-input" name="message" rows="4" placeholder="Ask something..." required></textarea>
            </label>
            <button id="chat-submit" type="submit">Send</button>
            <p id="chat-status" class="message" aria-live="polite"></p>
          </form>
        </section>
      </section>
    </main>

    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
  </body>
</html>
